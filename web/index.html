  <!-- ── Theme toggle helper ───────────────────────────────── -->
  <script>
    function toggleTheme() {
      var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      document.getElementById('theme-icon').textContent = next === 'dark' ? '\u2600' : '\u263D';
      localStorage.setItem('theme', next);
    }
    document.getElementById('theme-icon').textContent =
      document.documentElement.getAttribute('data-theme') === 'dark' ? '\u2600' : '\u263D';
  </script>
  <!-- ── Sound toggle helper ───────────────────────────────── -->
  <script>
    function toggleSound() {
      var isMuted = localStorage.getItem('soundMuted') === 'true';
      var next = !isMuted;
      localStorage.setItem('soundMuted', next);
      document.getElementById('sound-icon').textContent = next ? '\u{1F507}' : '\u{1F509}';
      if (next) {
        Sound.stop();
      } else {
        Sound.play();
      }
    }
    function initSoundIcon() {
      var isMuted = localStorage.getItem('soundMuted') === 'true';
      document.getElementById('sound-icon').textContent = isMuted ? '\u{1F507}' : '\u{1F509}';
    }
    initSoundIcon();
  </script>
